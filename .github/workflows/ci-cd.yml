# ═══════════════════════════════════════════════════════════════
#  PropVista — CI/CD Pipeline (GitHub Only)
#  Lint → Build → Deploy to GitHub Pages
# ═══════════════════════════════════════════════════════════════

name: PropVista CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# Grant Pages write permission
permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
# ─────────────────────────────────────────────────────────────

jobs:

  # ┌──────────────────────────────────────────────┐
  # │  JOB 1 — Lint & Validate                     │
  # └──────────────────────────────────────────────┘
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lint tools
        run: npm install --no-save htmlhint eslint

      - name: Validate HTML
        run: |
          npx htmlhint "**/*.html" \
            --rules='{"doctype-first":true,"tag-pair":true,"id-unique":true,"attr-value-double-quotes":true,"spec-char-escape":true}'

      - name: Check JS syntax
        run: |
          for f in app.js chat.js data.js; do
            echo "Checking $f ..."
            node --check "$f" && echo "  ✓ OK"
          done

      - name: ESLint
        run: |
          cat > .eslintrc.json << 'EOF'
          {
            "env": { "browser": true, "es2021": true },
            "parserOptions": { "ecmaVersion": 2021 },
            "rules": {
              "no-undef": "warn",
              "no-unused-vars": "warn",
              "eqeqeq": ["warn", "always"]
            },
            "globals": {
              "L": "readonly",
              "PROPERTIES": "readonly",
              "DEMO_ACCOUNTS": "readonly",
              "SEED_MESSAGES": "readonly",
              "PROP_GRADIENTS": "readonly",
              "PROP_ICONS": "readonly"
            }
          }
          EOF
          npx eslint app.js chat.js data.js --max-warnings=30 || true


  # ┌──────────────────────────────────────────────┐
  # │  JOB 2 — Build                               │
  # └──────────────────────────────────────────────┘
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minifiers
        run: |
          npm install --no-save \
            html-minifier-terser \
            terser \
            clean-css-cli

      - name: Create dist folder
        run: mkdir -p dist

      - name: Minify HTML
        run: |
          npx html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --minify-css true \
            --minify-js true \
            -o dist/index.html \
            index.html

      - name: Minify CSS
        run: npx cleancss -o dist/style.css style.css

      - name: Minify JS
        run: |
          for f in data.js app.js chat.js; do
            npx terser "$f" --compress --mangle -o "dist/$f"
          done

      - name: Stamp build info
        run: |
          SHA="${{ github.sha }}"
          echo "/* build:${SHA:0:7} */" >> dist/data.js

      - name: Show bundle sizes
        run: |
          echo "── Source ──────────────────────"
          du -sh index.html style.css app.js chat.js data.js
          echo "── Dist ────────────────────────"
          du -sh dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14


  # ┌──────────────────────────────────────────────┐
  # │  JOB 3 — PR Comment (diff sizes)             │
  # └──────────────────────────────────────────────┘
  pr-comment:
    name: 💬 PR Summary
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const sizes = execSync('du -sh dist/*').toString().trim();
            const sha = '${{ github.sha }}'.slice(0, 7);

            const body = [
              '## 🏠 PropVista Build Ready',
              '',
              '| Status | Details |',
              '|--------|---------|',
              `| ✅ Lint | Passed |`,
              `| ✅ Build | Minified & bundled |`,
              `| 📦 Commit | \`${sha}\` |`,
              '',
              '**Bundle sizes:**',
              '```',
              sizes,
              '```',
              '',
              '> Merge to `main` to deploy to GitHub Pages.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });


  # ┌──────────────────────────────────────────────┐
  # │  JOB 4 — Deploy to GitHub Pages              │
  # └──────────────────────────────────────────────┘
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to GitHub Pages
        id: pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/
          commit_message: "deploy: ${{ github.sha }}"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Print live URL
        run: |
          echo "========================================"
          echo "  ✅ PropVista is live!"
          echo "  🌐 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "========================================"
